{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Gestión de usuarios</h2>
  <a href="{{ url_for('add_user') }}" class="btn btn-primary btn-sm">Agregar usuario</a>
</div>
<div class="table-responsive shadow-sm rounded">
  <table class="table table-hover align-middle mb-0 bg-white">
    <thead class="table-dark">
      <tr>
        <th>Nombre</th>
        <th>Usuario</th>
        <th>Rol</th>
        <th class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td class="text-end">
          <a href="{{ url_for('edit_user', user_id=user.id) }}" class="btn btn-outline-secondary btn-sm">Editar</a>
          <a href="{{ url_for('delete_user', user_id=user.id) }}" class="btn btn-outline-danger btn-sm">Eliminar</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
