{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">{{ action }} usuario</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input name="name" type="text" class="form-control" required value="{{ user.name if user }}" />
          </div>
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input name="username" type="text" class="form-control" required value="{{ user.username if user }}" />
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input name="password" type="password" class="form-control" {% if not user %}required{% endif %} />
            {% if user %}
            <div class="form-text">Si no cambias la contraseña se mantiene la actual.</div>
            {% endif %}
          </div>
          <div class="mb-3">
            <label class="form-label">Rol</label>
            <select name="role" class="form-select">
              <option value="user" {% if user and user.role == 'user' %}selected{% endif %}>Usuario</option>
              <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Administrador</option>
            </select>
          </div>
          <button class="btn btn-primary">{{ action }}</button>
          <a href="{{ url_for('list_users') }}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
