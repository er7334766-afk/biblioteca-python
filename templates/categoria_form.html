{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header">{{ action }} categoría</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input name="name" type="text" class="form-control" required value="{{ category.name if category }}" />
          </div>
          <button class="btn btn-primary">{{ action }}</button>
          <a href="{{ url_for('listar_categorias') }}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
